<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiBizCore Studio v4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Base styles */
        .section-header { position: relative; padding-bottom: 10px; margin-bottom: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; color: #a1a1aa; border-bottom: 2px solid #18181b; display: flex; align-items: center; gap: 10px; }
        
        /* Component Card - Enhanced Hover */
        .component-card { background: #09090b; border: 1px solid #18181b; border-radius: 14px; padding: 24px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); position: relative; overflow: hidden;}
        .component-card:hover { border-color: #3f3f46; transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0,0,0,0.4); }
        
        .field-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #18181b; }
        .field-row:last-child { border-bottom: none; }
        .field-name { font-family: 'Mono', monospace; font-size: 13px; color: #60a5fa; font-weight: 500; }
        .field-type { font-family: 'Mono', monospace; font-size: 10px; color: #a1a1aa; background: #18181b; padding: 3px 8px; border-radius: 4px; border: 1px solid #27272a; }
        #canvas-content { padding: 48px; }

        /* Enhanced Metadata Display for Workspaces */
        .workspace-card { transition: all 0.3s ease; }
        .ws-metadata-item { padding-left: 14px; margin-bottom: 12px; position: relative; }
        .ws-metadata-label { font-size: 10px; color: #71717a; text-transform: uppercase; font-weight: bold; letter-spacing: 1.2px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans h-screen flex overflow-hidden">

    <div class="w-1/3 border-r border-zinc-900 flex flex-col bg-zinc-950 h-full">
        <div class="p-4 border-b border-zinc-900 flex items-center justify-between">
            <h1 class="text-lg font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">AiBizCore Studio</h1>
            <div class="flex items-center gap-2">
                <button id="clear-btn" class="px-2 py-1 bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-200 text-xs font-medium rounded border border-zinc-800 transition-colors">
                    Limpar
                </button>
                <span class="px-2 py-0.5 bg-blue-500/10 text-blue-400 text-xs rounded-full border border-blue-500/20 font-mono">v4.1</span>
            </div>
        </div>

        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4">
            <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-sm text-zinc-300">
                Olá. Sou o <strong>AiBizCore</strong>. Tenho memória da nossa sessão e posso gerar ou modificar arquiteturas complexas.
            </div>
        </div>

        <div class="p-4 border-t border-zinc-900 bg-zinc-950">
            <div class="relative flex items-center">
                <input id="prompt-input" type="text" placeholder="Escreva o seu pedido aqui..." 
                       class="w-full bg-zinc-900 border border-zinc-800 rounded-lg pl-3 pr-12 py-3 text-sm focus:outline-none focus:border-blue-500 text-zinc-100 placeholder-zinc-500 transition-all">
                <button id="send-btn" class="absolute right-2 p-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded-md transition-colors text-sm font-semibold">
                    Enviar
                </button>
            </div>
        </div>
    </div>

    <div class="w-2/3 flex flex-col bg-zinc-950 h-full relative">
        <div class="p-4 border-b border-zinc-900 flex items-center justify-between bg-zinc-950/50 backdrop-blur">
            <h2 class="text-xs font-bold text-zinc-700 uppercase tracking-wider">Project Canvas Study</h2>
            
            <div class="flex gap-2">
                <button id="save-cache-btn" class="hidden items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition-all shadow-lg shadow-blue-950/20">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Guardar na Memória
                </button>
                
                <button id="approve-btn" class="hidden items-center px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold rounded-lg transition-all shadow-lg shadow-emerald-950/20">
                    <i class="fa-solid fa-download mr-2"></i> Download Blueprint
                </button>
            </div>
        </div>

        <div id="canvas-content" class="flex-1 overflow-y-auto">
            <div id="canvas-placeholder" class="h-full flex flex-col items-center justify-center text-center text-zinc-800">
                <i class="fa-solid fa-drafting-compass text-6xl mb-6"></i>
                <p class="text-base font-medium">Nenhum esquema gerado</p>
            </div>
            
            <div id="render-zone" class="hidden space-y-16">
                <div id="workspaces-section" class="hidden">
                    <div class="section-header"><i class="fa-solid fa-users-gear text-purple-400"></i><span>Perfis de Acesso / Workspaces</span></div>
                    <div id="workspaces-grid" class="grid grid-cols-2 gap-8"></div>
                </div>

                <div id="objects-section" class="hidden">
                    <div class="section-header"><i class="fa-solid fa-box-open text-blue-400"></i><span>Objetos / Banco de Dados</span></div>
                    <div id="objects-grid" class="grid grid-cols-2 gap-8"></div>
                </div>

                <div id="actions-section" class="hidden">
                    <div class="section-header"><i class="fa-solid fa-cogs text-amber-400"></i><span>Processos e Ações</span></div>
                    <div id="actions-grid" class="grid grid-cols-2 gap-8"></div>
                </div>

                <div id="fallback-zone" class="hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/prompt";
        const CACHE_URL = "http://127.0.0.1:8000/api/save_cache"; // Nova Rota!
        
        let lastGeneratedSchema = null;
        let chatHistory = []; 

        const msgZone = document.getElementById('chat-messages');
        const input = document.getElementById('prompt-input');
        const approveBtn = document.getElementById('approve-btn');
        const saveCacheBtn = document.getElementById('save-cache-btn'); // Novo botão
        const placeholder = document.getElementById('canvas-placeholder');
        const renderZone = document.getElementById('render-zone');

        const workspacesSec = document.getElementById('workspaces-section');
        const workspacesGrid = document.getElementById('workspaces-grid');
        const objectsSec = document.getElementById('objects-section');
        const objectsGrid = document.getElementById('objects-grid');
        const actionsSec = document.getElementById('actions-section');
        const actionsGrid = document.getElementById('actions-grid');
        const fallbackZone = document.getElementById('fallback-zone');

        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
        document.getElementById('send-btn').addEventListener('click', handleSend);
        approveBtn.addEventListener('click', handleApprove);
        document.getElementById('clear-btn').addEventListener('click', handleClear);
        saveCacheBtn.addEventListener('click', handleSaveCache); // Novo evento

        // DICIONÁRIO DE TRADUÇÃO TÉCNICA
        const ptMap = {
            'VIEW': 'VER', 'READ': 'LER', 'CREATE': 'CRIAR', 'EDIT': 'EDITAR', 
            'UPDATE': 'ATUALIZAR', 'DELETE': 'APAGAR', 'WRITE': 'ESCREVER', 
            'ADMIN': 'ADMINISTRAR', 'DOMAIN_ACTION': 'AÇÃO DE NEGÓCIO', 
            'CRUD_ACTION': 'OPERAÇÃO BÁSICA', 'SYSTEM': 'SISTEMA', 'OBJECT': 'OBJETO'
        };

        function traduzir(termo) {
            if (!termo) return '';
            let t = termo.toString().toUpperCase().trim();
            return ptMap[t] || termo;
        }

        async function handleSend() {
            const prompt = input.value.trim(); if (!prompt) return;
            input.value = ""; appendMessage('user', prompt);
            chatHistory.push({ role: "user", content: prompt });
            
            const loadId = appendMessage('ai', `<div class="flex items-center gap-2 text-zinc-500"><i class="fa-solid fa-spinner animate-spin"></i><span>A processar pedido...</span></div>`);

            let promptFinal = prompt;
            if (chatHistory.length > 1) {
                let hist = chatHistory.slice(-5).map(m => `${m.role === 'user' ? 'Utilizador' : 'AiBizCore'}: ${m.content}`).join("\\n");
                promptFinal = `CONTEXTO:\\n${hist}\\n\\nPedido atual (responde a isto): ${prompt}`;
            }

            let currentSchemaPayload = null;
            if (lastGeneratedSchema) {
                currentSchemaPayload = lastGeneratedSchema.schema || lastGeneratedSchema.system || (lastGeneratedSchema.data && lastGeneratedSchema.data.objects ? lastGeneratedSchema.data : null) || lastGeneratedSchema.data || lastGeneratedSchema;
            }

            const payloadData = { 
                prompt: promptFinal,
                current_schema: currentSchemaPayload
            };

            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payloadData) 
                });
                const result = await response.json();
                document.getElementById(loadId).remove();

                if (typeof result === 'string') {
                    let txt = result.replace("AiBizCore: ", "");
                    appendMessage('ai', txt); 
                    chatHistory.push({ role: "assistant", content: txt });
                } else if (result.success) {
                    appendMessage('ai', `<div class="flex items-center gap-2"><i class="fa-solid fa-check-circle text-emerald-500"></i><strong>${traduzir(result.type) || 'SISTEMA'}</strong> processado com sucesso.</div>`);
                    lastGeneratedSchema = result; 
                    renderCanvas(result);
                }
            } catch (e) { 
                document.getElementById(loadId).remove(); 
                appendMessage('ai', `<div class="flex items-center gap-2"><i class="fa-solid fa-circle-exclamation text-red-500"></i> Erro de comunicação com o servidor.</div>`); 
            }
        }

        // ==========================================
        // NOVA FUNÇÃO: Guardar no Backend (Cache)
        // ==========================================
        async function handleSaveCache() {
            if (!lastGeneratedSchema) return;

            let currentSchemaPayload = lastGeneratedSchema.schema || lastGeneratedSchema.system || (lastGeneratedSchema.data && lastGeneratedSchema.data.objects ? lastGeneratedSchema.data : null) || lastGeneratedSchema.data || lastGeneratedSchema;
            
            const originalHTML = saveCacheBtn.innerHTML;
            saveCacheBtn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> A guardar...';
            
            try {
                const response = await fetch(CACHE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ schema_data: currentSchemaPayload })
                });

                if (response.ok) {
                    saveCacheBtn.innerHTML = '<i class="fa-solid fa-check"></i> Memória Atualizada!';
                    saveCacheBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
                    saveCacheBtn.classList.replace('hover:bg-blue-500', 'hover:bg-emerald-500');
                    
                    // Volta ao normal passado 3 segundos
                    setTimeout(() => {
                        saveCacheBtn.innerHTML = originalHTML;
                        saveCacheBtn.classList.replace('bg-emerald-600', 'bg-blue-600');
                        saveCacheBtn.classList.replace('hover:bg-emerald-500', 'hover:bg-blue-500');
                    }, 3000);
                } else {
                    throw new Error("Erro no servidor");
                }
            } catch (e) {
                alert("Falha ao guardar a memória no servidor.");
                saveCacheBtn.innerHTML = originalHTML;
            }
        }

        function appendMessage(sender, text) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const msgHtml = sender === 'user' 
                ? `<div class="flex justify-end"><div class="bg-blue-600 text-white rounded-lg px-3 py-2 text-sm max-w-[85%] break-words shadow-sm">${text}</div></div>`
                : `<div class="flex justify-start"><div id="${id}" class="bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm max-w-[85%] text-zinc-200 shadow-sm">${text}</div></div>`;
            msgZone.insertAdjacentHTML('beforeend', msgHtml); msgZone.scrollTop = msgZone.scrollHeight; return id;
        }

        function handleClear() { location.reload(); }

        function drawWorkspaces(list) {
            if (!list || list.length === 0) return;
            workspacesSec.classList.remove('hidden');
            list.forEach(wk => {
                let objectsBadges = (wk.objects || []).map(o => `<span class="px-2 py-0.5 bg-zinc-900 text-zinc-300 text-[11px] rounded border border-zinc-800 font-mono">${o}</span>`).join(' ');
                
                let permBadges = (wk.permissions || []).map(p => {
                    let colorClass = p.includes('WRITE') || p.includes('CREATE') || p.includes('ADMIN') || p.includes('EDIT') ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                    return `<span class="px-1.5 py-0.5 ${colorClass} text-[10px] font-bold rounded uppercase tracking-wider border font-mono">${traduzir(p)}</span>`
                }).join(' ');
                
                let color = wk.color || '#8b5cf6';
                let backgroundBleed = `style="background-image: linear-gradient(135deg, ${color}09 0%, transparent 70%); border-top: 4px solid ${color};"`

                workspacesGrid.insertAdjacentHTML('beforeend', `
                    <div class="component-card workspace-card" ${backgroundBleed}>
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-3">
                                <div class="text-2xl" style="color: ${color}90;"><i class="fa-solid fa-id-badge"></i></div>
                                <h4 class="font-bold text-zinc-100 text-base tracking-tight">${wk.name}</h4>
                            </div>
                        </div>
                        <p class="text-xs text-zinc-500 mb-6 leading-relaxed">${wk.description || ''}</p>
                        
                        <div class="space-y-4 pt-5 border-t border-zinc-900/50">
                            <div class="ws-metadata-item" style="border-left: 2px solid ${color}60;">
                                <span class="ws-metadata-label block mb-1">Entidade Foco</span>
                                <span class="text-sm text-blue-400 font-medium font-mono">${wk.primary_entity || 'N/A'}</span>
                            </div>
                            <div class="ws-metadata-item" style="border-left: 2px solid ${color}60;">
                                <span class="ws-metadata-label block mb-2">Objetos Visíveis (${(wk.objects || []).length})</span>
                                <div class="flex flex-wrap gap-1.5 mt-1">${objectsBadges}</div>
                            </div>
                            <div class="ws-metadata-item" style="border-left: 2px solid ${color}60;">
                                <span class="ws-metadata-label block mb-2">Permissões de Ação</span>
                                <div class="flex flex-wrap gap-1.5 mt-1">${permBadges}</div>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        function renderCanvas(result) {
            placeholder.classList.add('hidden');
            renderZone.classList.remove('hidden');
            
            // Mostrar os dois botões!
            approveBtn.classList.remove('hidden'); approveBtn.classList.add('flex');
            saveCacheBtn.classList.remove('hidden'); saveCacheBtn.classList.add('flex');

            workspacesGrid.innerHTML = ""; workspacesSec.classList.add('hidden');
            objectsGrid.innerHTML = ""; objectsSec.classList.add('hidden');
            actionsGrid.innerHTML = ""; actionsSec.classList.add('hidden');
            fallbackZone.innerHTML = ""; fallbackZone.classList.add('hidden');

            const schema = result.schema || result.system || (result.data && result.data.objects ? result.data : null) || result.data || result;

            if (!schema) {
                fallbackZone.innerHTML = `<div class="p-4 bg-red-900/10 text-red-400 border border-red-900 rounded-lg">Erro ao ler estrutura.</div>`;
                fallbackZone.classList.remove('hidden'); return;
            }

            if (schema.workspaces && Array.isArray(schema.workspaces)) {
                drawWorkspaces(schema.workspaces);
            } else if (result.type === "WORKSPACE" || Array.isArray(schema)) {
                const list = Array.isArray(schema) ? schema : result.data;
                drawWorkspaces(list);
            }

            if (schema.objects && schema.objects.length > 0) {
                objectsSec.classList.remove('hidden');
                schema.objects.forEach(obj => {
                    let fieldsHtml = (obj.fields || []).map(f => `<div class="field-row"><span class="field-name">${f.name}</span><span class="field-type">${f.type}</span></div>`).join('');
                    objectsGrid.insertAdjacentHTML('beforeend', `
                        <div class="component-card">
                            <div class="flex items-center gap-2.5 mb-4"><i class="fa-solid fa-cube text-blue-400"></i><h3 class="font-bold text-zinc-100">${obj.name}</h3></div>
                            <div class="space-y-1">${fieldsHtml}</div>
                        </div>
                    `);
                });
            } else if (result.type === "OBJECT" || (schema.name && schema.fields)) {
                objectsSec.classList.remove('hidden');
                let fieldsHtml = (schema.fields || []).map(f => `<div class="field-row"><span class="field-name">${f.name}</span><span class="field-type">${f.type}</span></div>`).join('');
                objectsGrid.insertAdjacentHTML('beforeend', `
                    <div class="component-card col-span-2 border-l-4 border-l-blue-500">
                        <div class="flex items-center gap-2.5 mb-4"><i class="fa-solid fa-cube text-blue-400"></i><h3 class="font-bold text-zinc-100">${schema.name}</h3><span class="text-zinc-500 text-xs">(Objeto Isolado)</span></div>
                        <div class="space-y-1">${fieldsHtml}</div>
                    </div>
                `);
            }

            if (schema.actions && schema.actions.length > 0) {
                actionsSec.classList.remove('hidden');
                schema.actions.forEach(act => {
                    actionsGrid.insertAdjacentHTML('beforeend', `
                        <div class="component-card border-l-4 border-l-amber-600">
                            <div class="flex items-center gap-2.5 mb-3"><i class="fa-solid fa-bolt text-amber-400"></i><h3 class="font-bold text-zinc-100">${act.name}</h3></div>
                            <p class="text-xs text-zinc-400 mb-2 leading-relaxed">${act.description || ''}</p>
                            <span class="px-2 py-0.5 bg-zinc-900 text-zinc-500 text-[10px] rounded font-mono border border-zinc-800">${traduzir(act.type) || 'AÇÃO'}</span>
                        </div>
                    `);
                });
            }
        }

        function handleApprove() {
            if (!lastGeneratedSchema) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(lastGeneratedSchema, null, 2));
            const downloadAnchor = document.createElement('a'); downloadAnchor.setAttribute("href", dataStr); downloadAnchor.setAttribute("download", `blueprint_aprovado.json`);
            document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove();
        }
    </script>
</body>
</html>
